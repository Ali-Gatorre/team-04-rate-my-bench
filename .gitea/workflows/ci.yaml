name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  build-api1:
    name: Build api1
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-04-api1:latest ./api1

  build-api2:
    name: Build api2
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-04-api2:latest ./api2

  build-api3:
    name: Build api3
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-04-api3:latest ./api3

  build-api4:
    name: Build api4
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-04-api4:latest ./api4

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-04-frontend:latest ./frontend

  push-images:
    name: Push Docker Hub images
    runs-on: ubuntu-latest
    needs:
      - build-api1
      - build-api2
      - build-api3
      - build-api4
      - build-frontend
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push api1
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api1:latest ./api1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api1:latest

      - name: Build and push api2
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api2:latest ./api2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api2:latest

      - name: Build and push api3
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api3:latest ./api3
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api3:latest

      - name: Build and push api4
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api4:latest ./api4
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api4:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/team-04-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-frontend:latest
