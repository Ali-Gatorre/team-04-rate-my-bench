name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:

  # =========================
  # 🔐 SECURITY SCAN (TRIVY)
  # =========================
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            aquasec/trivy:0.57.1 fs \
            --severity MEDIUM,HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            /workspace

  # =========================
  # 🏗️ BUILD IMAGES
  # =========================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API1
        run: docker build -t team-04-api1 ./api1

      - name: Build API2
        run: docker build -t team-04-api2 ./api2

      - name: Build API3
        run: docker build -t team-04-api3 ./api3

      - name: Build API4
        run: docker build -t team-04-api4 ./api4

      - name: Build Frontend
        run: docker build -t team-04-frontend ./frontend

  # =========================
  # 🚀 PUSH DOCKER HUB
  # =========================
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag images
        run: |
          docker tag team-04-api1 ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api1:latest
          docker tag team-04-api2 ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api2:latest
          docker tag team-04-api3 ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api3:latest
          docker tag team-04-api4 ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api4:latest
          docker tag team-04-frontend ${{ secrets.DOCKERHUB_USERNAME }}/team-04-frontend:latest

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api1:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api2:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api3:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-api4:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-04-frontend:latest
