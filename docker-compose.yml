services:
  db1:
    image: postgres:16-alpine
    container_name: db1
    restart: unless-stopped
    environment:
      POSTGRES_DB: benchdb
      POSTGRES_USER: benchuser
      POSTGRES_PASSWORD: benchpass
    ports:
      - "5433:5432"
    volumes:
      - db1_data:/var/lib/postgresql/data
      - ./db-init/db1-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - api1_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchuser -d benchdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  db2:
    image: postgres:16-alpine
    container_name: db2
    restart: unless-stopped
    environment:
      POSTGRES_DB: discussiondb
      POSTGRES_USER: discussionuser
      POSTGRES_PASSWORD: discussionpass
    ports:
      - "5434:5432"
    volumes:
      - db2_data:/var/lib/postgresql/data
      - ./db-init/db2-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - api2_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discussionuser -d discussiondb"]
      interval: 5s
      timeout: 5s
      retries: 10

  db3:
    image: postgres:16-alpine
    container_name: db3
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: userapi
      POSTGRES_PASSWORD: userpass
    ports:
      - "5435:5432"
    volumes:
      - db3_data:/var/lib/postgresql/data
      - ./db-init/db3-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - api3_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userapi -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  db4:
    image: postgres:16-alpine
    container_name: db4
    restart: unless-stopped
    environment:
      POSTGRES_DB: messagedb
      POSTGRES_USER: messageapi
      POSTGRES_PASSWORD: messagepass
    ports:
      - "5436:5432"
    volumes:
      - db4_data:/var/lib/postgresql/data
      - ./db-init/db4-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - api4_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messageapi -d messagedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api1:
    build: ./api1
    container_name: api1
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./api1:/app
      - /app/node_modules
      - ./api1/uploads:/app/uploads
    environment:
      API1_PORT: 5001
      API1_DB_HOST: db1
      API1_DB_PORT: 5432
      API1_DB_NAME: benchdb
      API1_DB_USER: benchuser
      API1_DB_PASSWORD: benchpass
    depends_on:
      db1:
        condition: service_healthy
    networks:
      - api1_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api2:
    build: ./api2
    container_name: api2
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - ./api2:/app
      - /app/node_modules
    environment:
      API2_PORT: 5002
      API2_DB_HOST: db2
      API2_DB_PORT: 5432
      API2_DB_NAME: discussiondb
      API2_DB_USER: discussionuser
      API2_DB_PASSWORD: discussionpass
    depends_on:
      db2:
        condition: service_healthy
    networks:
      - api2_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api3:
    build: ./api3
    container_name: api3
    restart: unless-stopped
    ports:
      - "5003:5003"
    volumes:
      - ./api3:/app
      - /app/node_modules
      - ./api3/uploads:/app/uploads
    environment:
      API3_PORT: 5003
      API3_DB_HOST: db3
      API3_DB_PORT: 5432
      API3_DB_NAME: userdb
      API3_DB_USER: userapi
      API3_DB_PASSWORD: userpass
      JWT_SECRET: super_secret_dev_key
    depends_on:
      db3:
        condition: service_healthy
    networks:
      - api3_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5003/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api4:
    build: ./api4
    container_name: api4
    restart: unless-stopped
    ports:
      - "5004:5004"
    volumes:
      - ./api4:/app
      - /app/node_modules
    environment:
      API4_PORT: 5004
      API4_DB_HOST: db4
      API4_DB_PORT: 5432
      API4_DB_NAME: messagedb
      API4_DB_USER: messageapi
      API4_DB_PASSWORD: messagepass
      JWT_SECRET: super_secret_dev_key
    depends_on:
      db4:
        condition: service_healthy
    networks:
      - api4_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5004/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API1_URL: http://localhost:5001
      VITE_API2_URL: http://localhost:5002
      VITE_API3_URL: http://localhost:5003
      VITE_API4_URL: http://localhost:5004
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
      api4:
        condition: service_healthy
    networks:
      - api1_net
      - api2_net
      - api3_net
      - api4_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db1_data:
  db2_data:
  db3_data:
  db4_data:

networks:
  api1_net:
  api2_net:
  api3_net:
  api4_net:
